fastcgi_cache_path /var/cache/nginx/nimonspedia levels=1:2 keys_zone=nimonspedia_cache:10m inactive=60m use_temp_path=off;

map $request_method $no_cache_method {
    POST    1;
    default 0;
}

map $http_cookie $no_cache_cookie {
    default 0;
    ~*PHPSESSID* 1;
}

map $request_uri $no_cache_uri {
    default 1;
    ~^/$ 0;
    ~^/products 0;
    ~^/store 0;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

	client_max_body_size 10M;

    location ~ ^/(admin|auction|chat|payment)(/.*)?$ {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

	location /storage/ {
        alias /var/www/html/storage/;
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        try_files $uri /index.php?$query_string;
        
        fastcgi_cache nimonspedia_cache;
        fastcgi_cache_valid 200 1m;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        
        fastcgi_cache_bypass $no_cache_method $no_cache_cookie $no_cache_uri;
        fastcgi_no_cache $no_cache_method $no_cache_cookie $no_cache_uri;
        
        # Force cache even if backend says no
        fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
        
        # Strip Set-Cookie from cached response to prevent session leakage
        fastcgi_hide_header Set-Cookie;
        
        add_header X-FastCGI-Cache $upstream_cache_status;

        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /api/node/ {
        proxy_pass http://node-server:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://node-server:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /\. {
        deny all;
    }
}