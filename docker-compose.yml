services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nimonspedia-php
    volumes:
      - .:/var/www/html
    command: sh -c "chmod -R 777 /var/www/html/storage && /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf"
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    networks:
      - nimonspedia-network

  db:
    image: postgres:16-alpine
    container_name: nimonspedia-db
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - nimonspedia-network

  node-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nimonspedia-node
    ports: 
      - "${NODE_LOCAL_PORT}:${NODE_PORT}"
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${NODE_PORT}
    networks:
      - nimonspedia-network
    volumes:
     - ./storage:/app/public/uploads

  redis:
    image: redis:alpine
    container_name: nimonspedia-redis
    networks:
      - nimonspedia-network
  
  nginx:
    image: nimonspedia-nginx:latest
    container_name: nimonspedia-nginx
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        - VITE_API_BASE_URL=http://localhost:${NGINX_PORT}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./public:/var/www/html/public/
      - ./src:/var/www/html/src
      - ./storage:/var/www/html/storage
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - node-server
    networks:
      - nimonspedia-network
    command: >
      sh -c "cp -ru /tmp/react-build/* /var/www/html/public/ && 
        chmod -R 755 /var/www/html/public && rm -rf /tmp/react-build/* &&
        nginx -g 'daemon off;'"

volumes:
  postgres_data:

networks:
  nimonspedia-network:
    driver: bridge
